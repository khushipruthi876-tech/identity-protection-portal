<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login - Identity Protection Portal</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar">
    <h1>🛡️ Identity Protection Portal</h1>
    <div>
      <a href="index.html">Home</a>
    </div>
  </nav>

  <div class="container">
    <div class="card" style="max-width: 420px; margin: 0 auto;">
      <h2>Login</h2>
      <p>Enter your credentials to access your dashboard.</p>

      <form id="loginForm">
        <input type="email" id="email" placeholder="Email address" required />
        <input type="password" id="password" placeholder="Password" required />
        <p class="error-text" id="errorText">Invalid email or password.</p>
        <button type="submit" class="btn">Log In</button>
      </form>

      <p style="margin-top: 16px; font-size: 0.9rem;">
        Don't have an account?
        <a href="#" id="signupLink" style="color: var(--primary);">Sign up</a>
      </p>
    </div>
  </div>

  <footer>&copy; 2026 Digital Identity Protection Portal — Student Project</footer>

  <script src="js/main.js"></script>
</body>
</html>
